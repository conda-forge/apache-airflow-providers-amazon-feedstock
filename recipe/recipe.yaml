context:
  name: apache-airflow-providers-amazon
  version: "9.22.0"
  latest_airflow: 3.1.7

recipe:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/apache_airflow_providers_amazon-${{ version }}.tar.gz
  sha256: f2d9fba7cf9f601c7c7518f5bbfe3012677868c6cc83b9977e59f342bf372a34

build:
  noarch: python
  number: 0

outputs:
  - package:
      name: ${{ name }}
    build:
      noarch: python
      script: python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - flit-core ==3.12.0
      run:
        - python >=${{ python_min }}
        - apache-airflow >=2.11.0
        - apache-airflow-providers-common-compat >=1.13.0
        - apache-airflow-providers-common-sql >=1.32.0
        - apache-airflow-providers-http
        - boto3 >=1.41.0
        - botocore >=1.41.0
        - inflection >=0.5.1
        - watchtower >=3.3.1,<4
        - jsonpath-ng >=1.5.3
        - redshift_connector >=2.1.3
        - asgiref >=2.3.0
        - pyathena >=3.10.0
        - jmespath >=0.7.0
        - sagemaker-studio >=1.0.9
        # more restrictive for python >=3.13
        - pydynamodb >=0.7.5
        # more restrictive for python >=3.13
        - sqlean.py >=3.47.0
        - marshmallow >=3

        # temproary constraints to avoid pip check problems
        - pyiceberg >=0.8.1
        - pynacl <1.6.1
    tests:
      - requirements:
          run:
            - python ${{ python_min }}.*
            - pip
            - apache-airflow ${{ latest_airflow }}.*
        script:
          - python -c "import airflow.providers.amazon"
          - pip check

  - package:
      name: ${{ name }}-with-aiobotocore
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage(name, exact=True) }}
        - aiobotocore >=2.26.0
        # start aiobotocore[boto3]
        # end aiobotocore[boto3]
    tests:
      - requirements:
          run:
            - python ${{ python_min }}.*
            - pip
            - apache-airflow ${{ latest_airflow }}.*
        script:
          - python -c "import airflow.providers.amazon"
          - pip check

  - package:
      name: ${{ name }}-with-apache-hive
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
